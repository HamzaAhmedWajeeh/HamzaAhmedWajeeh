<svg width="860" height="540" viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal card: Hamza Ahmed Wajeeh, AI and backend engineer, air-gapped production systems, Riyadh">
  <style>
    .t   { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, 'DejaVu Sans Mono', monospace; font-size: 14px; }
    .sm  { font-size: 12px; }
    .lg  { font-size: 16px; font-weight: bold; }
    .key { fill: #4fd6be; }
    .val { fill: #e6edf3; }
    .gold{ fill: #e8b44c; }
    .dim { fill: #7d8590; }
    .host{ fill: #4fd6be; font-weight: bold; }
  </style>

  <!-- window -->
  <rect x="1" y="1" width="858" height="538" rx="12" fill="#0b1220" stroke="#1c2536" stroke-width="2"/>

  <!-- title bar -->
  <rect x="1" y="1" width="858" height="46" rx="12" fill="#111a2c"/>
  <rect x="1" y="24" width="858" height="22" fill="#111a2c"/>
  <line x1="1" y1="46" x2="859" y2="46" stroke="#1c2536" stroke-width="1.5"/>
  <circle cx="30" cy="24" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="24" r="6" fill="#febc2e"/>
  <circle cx="74" cy="24" r="6" fill="#28c840"/>
  <text x="430" y="29" text-anchor="middle" class="t sm dim">hamza@riyadh: ~</text>

  <!-- first prompt -->
  <text x="28" y="76" class="t" xml:space="preserve"><tspan class="host">hamza@riyadh</tspan><tspan class="dim">:</tspan><tspan class="gold">~</tspan><tspan class="dim">$ </tspan><tspan class="val">fastfetch</tspan></text>

  <!-- server rack -->
  <g transform="translate(44,104)">
    <rect x="0" y="0" width="200" height="272" rx="8" fill="#0e1830" stroke="#263450" stroke-width="2"/>

    <!-- unit 1 -->
    <rect x="12" y="14" width="176" height="52" rx="5" fill="#121f3a" stroke="#1c2a44" stroke-width="1"/>
    <rect x="24" y="24" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="36" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="48" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <circle cx="150" cy="30" r="4" fill="#e8b44c"/>
    <circle cx="168" cy="30" r="4" fill="#4fd6be">
      <animate attributeName="opacity" values="1;0.15;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="48" r="4" fill="#2a3a5c"/>
    <circle cx="168" cy="48" r="4" fill="#2a3a5c"/>

    <!-- unit 2 -->
    <rect x="12" y="78" width="176" height="52" rx="5" fill="#121f3a" stroke="#1c2a44" stroke-width="1"/>
    <rect x="24" y="88" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="100" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="112" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <circle cx="150" cy="94" r="4" fill="#e8b44c">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="168" cy="94" r="4" fill="#4fd6be"/>
    <circle cx="150" cy="112" r="4" fill="#2a3a5c"/>
    <circle cx="168" cy="112" r="4" fill="#2a3a5c"/>

    <!-- unit 3 -->
    <rect x="12" y="142" width="176" height="52" rx="5" fill="#121f3a" stroke="#1c2a44" stroke-width="1"/>
    <rect x="24" y="152" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="164" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="176" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <circle cx="150" cy="158" r="4" fill="#e8b44c"/>
    <circle cx="168" cy="158" r="4" fill="#4fd6be">
      <animate attributeName="opacity" values="0.15;1;0.15" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="176" r="4" fill="#2a3a5c"/>
    <circle cx="168" cy="176" r="4" fill="#2a3a5c"/>

    <!-- unit 4 -->
    <rect x="12" y="206" width="176" height="52" rx="5" fill="#121f3a" stroke="#1c2a44" stroke-width="1"/>
    <rect x="24" y="216" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="228" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <rect x="24" y="240" width="100" height="7" rx="2" fill="#1f2f4f"/>
    <circle cx="150" cy="222" r="4" fill="#e8b44c"/>
    <circle cx="168" cy="222" r="4" fill="#4fd6be"/>
    <circle cx="150" cy="240" r="4" fill="#2a3a5c"/>
    <circle cx="168" cy="240" r="4" fill="#2a3a5c"/>

    <text x="100" y="296" text-anchor="middle" class="t sm dim">on-prem &#183; air-gapped &#183; sovereign</text>
  </g>

  <!-- fastfetch output -->
  <text x="300" y="130" class="t lg" xml:space="preserve"><tspan class="host">hamza</tspan><tspan class="dim">@</tspan><tspan class="host">riyadh</tspan></text>
  <line x1="300" y1="141" x2="470" y2="141" stroke="#3a4763" stroke-width="1.5"/>

  <text x="300" y="170" class="t key">OS</text>
  <text x="404" y="170" class="t val">Production Linux, air-gapped</text>

  <text x="300" y="193" class="t key">Host</text>
  <text x="404" y="193" class="t val">Riyadh, Saudi Arabia (UTC+3)</text>

  <text x="300" y="216" class="t key">Role</text>
  <text x="404" y="216" class="t val">AI + Backend Engineer</text>

  <text x="300" y="239" class="t key">Uptime</text>
  <text x="404" y="239" class="t val">5+ yrs shipping to production</text>

  <text x="300" y="262" class="t key">Kernel</text>
  <text x="404" y="262" class="t val">Python 3.12 &#183; Django &#183; FastAPI</text>

  <text x="300" y="285" class="t key">Serving</text>
  <text x="404" y="285" class="t val">vLLM &#183; RAG &#183; agent pipelines</text>

  <text x="300" y="308" class="t key">Locale</text>
  <text x="404" y="308" class="t val">ar_SA.UTF-8 (Arabic-first NLP)</text>

  <text x="300" y="331" class="t key">DB</text>
  <text x="404" y="331" class="t val">PostgreSQL &#183; Redis &#183; Qdrant</text>

  <text x="300" y="354" class="t key">Infra</text>
  <text x="404" y="354" class="t val">Kubernetes &#183; Docker &#183; Celery</text>

  <text x="300" y="377" class="t key">Shell</text>
  <text x="404" y="377" class="t val">bash (PowerShell when required)</text>

  <!-- palette -->
  <rect x="300" y="400" width="22" height="14" rx="2" fill="#0b1220" stroke="#263450" stroke-width="1"/>
  <rect x="326" y="400" width="22" height="14" rx="2" fill="#1c2536"/>
  <rect x="352" y="400" width="22" height="14" rx="2" fill="#e8b44c"/>
  <rect x="378" y="400" width="22" height="14" rx="2" fill="#f2d492"/>
  <rect x="404" y="400" width="22" height="14" rx="2" fill="#4fd6be"/>
  <rect x="430" y="400" width="22" height="14" rx="2" fill="#2b9e87"/>
  <rect x="456" y="400" width="22" height="14" rx="2" fill="#e6edf3"/>
  <rect x="482" y="400" width="22" height="14" rx="2" fill="#7d8590"/>

  <!-- signature comment -->
  <text x="28" y="452" class="t dim"># most of the interesting work never leaves the building</text>

  <!-- final prompt with blinking cursor -->
  <text x="28" y="490" class="t" xml:space="preserve"><tspan class="host">hamza@riyadh</tspan><tspan class="dim">:</tspan><tspan class="gold">~</tspan><tspan class="dim">$ </tspan></text>
  <rect x="170" y="477" width="9" height="17" fill="#e8b44c">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.2s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>
</svg>
